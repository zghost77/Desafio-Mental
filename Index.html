<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Survivor Shooter</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  background: #111;
  display: block;
  margin: auto;
  border: 2px solid #00ffcc;
}
</style>
</head>

<body>

<h2>🔫 Survivor Shooter</h2>
<p>WASD = mover | Clique = atirar</p>

<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:200,y:400,size:20};
let bullets = [];
let enemies = [];
let keys = {};
let score = 0;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("click", () => {
  bullets.push({x:player.x, y:player.y});
});

function spawnEnemy() {
  enemies.push({
    x: Math.random()*380,
    y: 0,
    size: 20
  });
}

setInterval(spawnEnemy, 1000);

function update() {
  if(keys["w"]) player.y -= 3;
  if(keys["s"]) player.y += 3;
  if(keys["a"]) player.x -= 3;
  if(keys["d"]) player.x += 3;

  bullets.forEach(b => b.y -= 5);
  enemies.forEach(e => e.y += 2);

  // colisão
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if(Math.abs(b.x - e.x) < 20 && Math.abs(b.y - e.y) < 20) {
        enemies.splice(ei,1);
        bullets.splice(bi,1);
        score++;
      }
    });
  });

    if(Math.abs(player.x - e.x) < 20 && Math.abs(player.y - e.y) < 20) {
      alert("💀 Você morreu! Pontos: " + score
