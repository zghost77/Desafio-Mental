<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Click Rush</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #111);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#btn {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: #00ffcc;
  cursor: pointer;
  transition: 0.1s;
}

#btn:active {
  transform: scale(0.85);
  background: #00ffaa;
}

#score {
  font-size: 30px;
  margin-top: 20px;
}

#time, #record {
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🔥 Click Rush</h1>

<button id="btn">CLICA!</button>

<div id="score">Pontos: 0</div>
<div id="time">Tempo: 10</div>
<div id="record">Recorde: 0</div>

<script>
let score = 0;
let time = 10;
let playing = false;

let record = localStorage.getItem("record") || 0;
document.getElementById("record").innerText = "Recorde: " + record;

const btn = document.getElementById("btn");

btn.onclick = () => {
  if (!playing) {
    startGame();
  } else {
    score++;
    document.getElementById("score").innerText = "Pontos: " + score;

    // chance de ganhar tempo bônus
    if (Math.random() < 0.2) {
      time += 1;
    }
  }
};

function startGame() {
  playing = true;
  score = 0;
  time = 10;

  let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = "Tempo: " + time;

    if (time <= 0) {
      clearInterval(timer);
      playing = false;

      if (score > record) {
        record = score;
        localStorage.setItem("record", record);
        alert("🔥 Novo recorde: " + score);
      } else {
        alert("Fim! Pontos: " + score);
      }
    }
  }, 1000);
}
</script>

</body>
</html>
